<!DOCTYPE html>
<html>
<head>

<title>Table Tennis Rankings</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

html, body {
  height: 100%;
  margin: 0;
  display: flex;
  flex-direction: column;
  font-family: Arial;
}

body {
  text-align: center;
}

main {
  flex: 1;
}

table{
  width:95%;
  margin:auto;
  border-collapse:collapse;
  margin-top: 20px;
}

th, td{
  border:1px solid black;
  padding:10px;
}

th{
  background:#eee;
}

button{
  padding:6px 10px;
  margin:2px;
}

footer {
  padding: 20px;
  background: #f0f0f0;
}

.reset-button{
  padding:10px 20px; 
  font-size:16px; 
  background:#f44336; 
  color:white; 
  border:none; 
  cursor:pointer;
}

</style>

</head>

<body>

<h1>Table Tennis Rankings</h1>

<main>
<table>
<thead>
<tr>
<th>Rank</th>
<th>Player</th>
<th>Points</th>
<th>Wins</th>
<th>Losses</th>
<th>Record</th>
</tr>
</thead>
<tbody id="leaderboard"></tbody>
</table>
</main>

<footer>
  <button class="reset-button" onclick="resetScores()">Reset Scores</button>
</footer>

<script>

let defaultPlayers = [
{name:"Haydence",points:0,wins:0,losses:0},
{name:"Henri",points:0,wins:0,losses:0},
{name:"Matthew",points:0,wins:0,losses:0},
{name:"Mikal",points:0,wins:0,losses:0},
{name:"Adam",points:0,wins:0,losses:0},
{name:"Oneek",points:0,wins:0,losses:0},
{name:"Benoit",points:0,wins:0,losses:0},
{name:"Alex",points:0,wins:0,losses:0}
];

let players = JSON.parse(localStorage.getItem("players")) || defaultPlayers;

function save(){
  localStorage.setItem("players",JSON.stringify(players));
}

function addWin(i){
  players[i].points += 100;
  players[i].wins += 1;
  update();
}

function addLoss(i){
  players[i].losses += 1;
  update();
}

function resetScores(){
  if(confirm("Are you sure you want to reset all scores?")) {
    players.forEach(p => {
      p.points = 0;
      p.wins = 0;
      p.losses = 0;
    });
    update();
  }
}

function update(){
  players.sort((a,b)=>b.points-a.points);

  let html="";

  players.forEach((p,i)=>{
    html +=
    `<tr>
      <td>${i+1}</td>
      <td style="color:blue">${p.name}</td>
      <td>${p.points}</td>
      <td>${p.wins}</td>
      <td>${p.losses}</td>
      <td>
        <button onclick="addWin(${i})">+Win</button>
        <button onclick="addLoss(${i})">+Loss</button>
      </td>
    </tr>`;
  });

  document.getElementById("leaderboard").innerHTML = html;

  save();
}

update();

</script>

</body>
</html>
