<!DOCTYPE html>
<html>
<head>
  <title>Table Tennis Rankings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body { height: 100%; margin: 0; display: flex; flex-direction: column; font-family: Arial; }
    body { text-align: center; }
    main { flex: 1; }
    table { width:95%; margin:auto; border-collapse:collapse; margin-top: 20px; }
    th, td { border:1px solid black; padding:10px; }
    th { background:#eee; }
    button { padding:6px 10px; margin:2px; }
    footer { padding: 20px; background: #f0f0f0; }
    .reset-button { padding:10px 20px; font-size:16px; background:#f44336; color:white; border:none; cursor:pointer; }
  </style>
</head>
<body>

<h1>Table Tennis Rankings</h1>

<main>
  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Player</th>
        <th>Points</th>
        <th>Wins</th>
        <th>Losses</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="leaderboard"></tbody>
  </table>
</main>

<footer>
  <button class="reset-button" onclick="resetScores()">Reset Scores</button>
</footer>

<!-- Firebase Initialization Script -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";

  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX",
    measurementId: "XXXX"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
</script>

<!-- Leaderboard Logic with Firestore and tie-aware ranking -->
<script type="module">
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const db = getFirestore();

  let players = [
    {name:"Haydence",points:0,wins:0,losses:0},
    {name:"Henri",points:0,wins:0,losses:0},
    {name:"Matthew",points:0,wins:0,losses:0},
    {name:"Mikal",points:0,wins:0,losses:0},
    {name:"Adam",points:0,wins:0,losses:0},
    {name:"Oneek",points:0,wins:0,losses:0},
    {name:"Benoit",points:0,wins:0,losses:0},
    {name:"Alex",points:0,wins:0,losses:0}
  ];

  // Save players to Firestore
  async function save() {
    await setDoc(doc(db,"leaderboard","scores"), {players});
  }

  // Load players from Firestore
  async function load() {
    const snap = await getDoc(doc(db,"leaderboard","scores"));
    if(snap.exists()){
      players = snap.data().players;
    }
    update();
  }

  window.addWin = function(i){
    players[i].points += 100;
    players[i].wins += 1;
    update();
  }

  window.addLoss = function(i){
    players[i].losses += 1;
    update();
  }

  window.resetScores = function(){
    if(confirm("Reset scores?")){
      players.forEach(p=>{
        p.points=0;
        p.wins=0;
        p.losses=0;
      });
      update();
    }
  }

  // Update leaderboard with tie-aware ranking
  function update(){
    players.sort((a,b)=>b.points-a.points);

    let html = "";
    let rank = 1;
    let prevPoints = null;
    let skip = 0;

    players.forEach((p,i)=>{
      if(prevPoints !== null){
        if(p.points === prevPoints){
          skip++;
        } else {
          rank = rank + skip;
          skip = 1;
        }
      } else {
        skip = 1;
      }

      prevPoints = p.points;

      html += `
        <tr>
          <td>${rank}</td>
          <td style="color:blue">${p.name}</td>
          <td>${p.points}</td>
          <td>${p.wins}</td>
          <td>${p.losses}</td>
          <td>
            <button onclick="addWin(${i})">+Win</button>
            <button onclick="addLoss(${i})">+Loss</button>
          </td>
        </tr>`;
    });

    document.getElementById("leaderboard").innerHTML = html;

    save(); // save to Firestore
  }

  load(); // initial load
</script>

</body>
</html>
