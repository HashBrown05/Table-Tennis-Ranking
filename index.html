<!DOCTYPE html>
<html>
<head>
<title>Table Tennis Rankings</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
  height: 100%;
  margin: 0;
  display: flex;
  flex-direction: column;
  font-family: Arial;
}

body { text-align: center; }
main { flex: 1; }

table {
  width:95%;
  margin:auto;
  border-collapse:collapse;
  margin-top: 20px;
}

th, td { border:1px solid black; padding:10px; }
th { background:#eee; }
button { padding:6px 10px; margin:2px; }

footer {
  padding: 20px;
  background: #f0f0f0;
}

.reset-button{
  padding:10px 20px; 
  font-size:16px; 
  background:#f44336; 
  color:white; 
  border:none; 
  cursor:pointer;
}

.login-box{
  margin: 10px;
}
</style>
</head>

<body>

<h1>Table Tennis Rankings</h1>

<div class="login-box">
  <button onclick="loginAdmin()">Login as Admin</button>
  <span id="status">Not logged in</span>
</div>

<main>
  <table>
    <thead>
      <tr>
        <th>Rank</th>
        <th>Player</th>
        <th>Points</th>
        <th>Wins</th>
        <th>Record</th>
      </tr>
    </thead>
    <tbody id="leaderboard"></tbody>
  </table>
</main>

<footer>
  <button class="reset-button" onclick="resetScores()">Reset Scores</button>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { 
  getFirestore, doc, getDoc, setDoc 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { 
  getAuth, signInWithEmailAndPassword, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDUjBGs1emV2ZKQteEEhi667DsnZqFxkYY",
  authDomain: "table-tennis-1bd8b.firebaseapp.com",
  projectId: "table-tennis-1bd8b",
  storageBucket: "table-tennis-1bd8b.firebasestorage.app",
  messagingSenderId: "943725313614",
  appId: "1:943725313614:web:c30d8fea84dd1550308d1f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let isAdmin = false;

// 🔐 LOGIN FUNCTION (YOU USE THIS BUTTON)
window.loginAdmin = async function () {
  try {
    await signInWithEmailAndPassword(
      auth,
      "YOUR_ADMIN_EMAIL",
      "YOUR_ADMIN_PASSWORD"
    );
    alert("Logged in as admin");
  } catch (e) {
    alert("Login failed");
    console.error(e);
  }
};

// track login state
onAuthStateChanged(auth, (user) => {
  if (user) {
    isAdmin = true;
    document.getElementById("status").innerText = "Admin logged in";
  } else {
    isAdmin = false;
    document.getElementById("status").innerText = "Not logged in";
  }
});

// Players
let players = [
  {name:"Haydence",points:0,wins:0},
  {name:"Henri",points:0,wins:0},
  {name:"Matthew",points:0,wins:0},
  {name:"Mikal",points:0,wins:0},
  {name:"Adam",points:0,wins:0},
  {name:"Oneek",points:0,wins:0},
  {name:"Benoit",points:0,wins:0},
  {name:"Alex",points:0,wins:0},
  {name:"Andrew",points:0,wins:0}
];

async function save() {
  if (!isAdmin) return; // 🔒 block saving for public users
  await setDoc(doc(db,"leaderboard","scores"), {players});
}

async function load() {
  const snap = await getDoc(doc(db,"leaderboard","scores"));

  if (snap.exists() && snap.data().players?.length) {
    players = snap.data().players;
  }

  update();
}

window.addWin = function(i){
  if (!isAdmin) return alert("Admin only");
  players[i].points += 100;
  players[i].wins++;
  update();
}

window.removeWin = function(i){
  if (!isAdmin) return alert("Admin only");
  if(players[i].wins > 0){
    players[i].wins--;
    players[i].points = Math.max(0, players[i].points - 100);
    update();
  }
}

window.resetScores = function(){
  if (!isAdmin) return alert("Admin only");
  if(confirm("Reset all scores?")){
    players.forEach(p=>{
      p.points = 0;
      p.wins = 0;
    });
    update();
  }
}

function update(){
  players.sort((a,b)=>b.points-a.points);

  let html = "";
  let rank = 1, prev = null, skip = 0;

  players.forEach((p,i)=>{
    if(prev !== null){
      if(p.points === prev) skip++;
      else { rank += skip; skip = 1; }
    } else skip = 1;

    prev = p.points;

    html += `
      <tr>
        <td>${rank}</td>
        <td>${p.name}</td>
        <td>${p.points}</td>
        <td>${p.wins}</td>
        <td>
          <button onclick="addWin(${i})">+Win</button>
          <button onclick="removeWin(${i})">-Win</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("leaderboard").innerHTML = html;
  save();
}

load();
</script>

</body>
</html>
